name: NeonFocus
options:
  bundleIdPrefix: com.gokul
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: complete
    PRODUCT_NAME: NeonFocus
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
  configs:
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application"
      DEVELOPMENT_TEAM: "473BWG9258"

targets:
  NeonFocus:
    type: application
    platform: macOS
    sources:
      - path: NeonFocus
        excludes:
          - "Info.plist"
          - "NeonFocus.entitlements"
    resources:
      - path: NeonFocus/Assets.xcassets
        optional: true
    dependencies:
      - sdk: AppIntents.framework
    info:
      path: NeonFocus/Info.plist
      properties:
        CFBundleDisplayName: NeonFocus
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSAppleEventsUsageDescription: NeonFocus needs to read the focused terminal window's frame to draw the overlay around it.
    entitlements:
      path: NeonFocus/NeonFocus.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gokul.NeonFocus
        INFOPLIST_FILE: NeonFocus/Info.plist
        CODE_SIGN_ENTITLEMENTS: NeonFocus/NeonFocus.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        APP_SHORTCUTS_ENABLE_FLEXIBLE_MATCHING: NO

  NeonFocusTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NeonFocus/Settings/NeonFocusSettings.swift
      - path: NeonFocus/ActiveApp/ActiveAppMonitor.swift
      - path: NeonFocus/Overlay/NeonPulseAnimationSpec.swift
      - path: NeonFocus/Overlay/NeonPulseView.swift
      - path: NeonFocus/Menu/StatusMenuController.swift
      - path: NeonFocusTests
    dependencies:
      - sdk: AppIntents.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: NeonFocusTests
        PRODUCT_MODULE_NAME: NeonFocusTests
        APP_SHORTCUTS_ENABLE_FLEXIBLE_MATCHING: NO

schemes:
  NeonFocus:
    build:
      targets:
        NeonFocus: all
        NeonFocusTests: [test]
    test:
      targets:
        - NeonFocusTests
